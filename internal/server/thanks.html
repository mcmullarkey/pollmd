<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Thanks!</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="card">
    <div class="hero">
      <h1>Thanks for your vote.</h1>
      <p class="subtitle">Your vote has been recorded.</p>
    </div>
    <p class="links">
      <a class="back-link" href="{{.SiteURL}}">Back to site &rarr;</a>
    </p>
    <p class="muted">
      No cookies, no tracking. Your request was hashed anonymously with a salt
      that rotates every day at midnight UTC, so the hash can&rsquo;t be tied
      back to you.
    </p>
    <p class="footer-credit">
      Created with <a href="https://github.com/sspaeti/pollmd" rel="noopener">pollmd</a>
    </p>
  </main>
</body>
</html>
